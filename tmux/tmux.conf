# Terminal
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Prefix
unbind C-b
set-option -g prefix C-t
set-option -g repeat-time 0
set-option -g focus-events on

# General
set-window-option -g mode-keys vi
set-option -g history-limit 64096
set -sg escape-time 10
set -g set-titles on
set -g set-titles-string "#T"

# Claude Code 応答待ちフラグ: window を切り替えて入ってきた時に解除
# session-window-changed は新しいアクティブ window をターゲットに発火する
set-hook -g session-window-changed 'set-option -w -u @claude_waiting'

# Copy mode
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi d send -X halfpage-down
bind -T copy-mode-vi u send -X halfpage-up

# Utility
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind o run-shell "open '#{pane_current_path}'"
bind X kill-pane -a
bind g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit
bind -r y run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5 | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux set-environment -t "$SESSION" CLAUDE_PARENT_PANE "#{pane_id}"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# Pane navigation (vim-like)
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# Pane resize
bind C-k resize-pane -U 5
bind C-j resize-pane -D 5
bind C-h resize-pane -L 5
bind C-l resize-pane -R 5

# Window move
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Colors
set -g window-style fg=colour10,bg=default
set -g window-active-style fg=colour12,bg=default
set-option -g display-panes-active-colour colour33
set-option -g display-panes-colour colour166
set-window-option -g clock-mode-colour colour64

source ~/.config/tmux/statusline.conf

# tmux-agent-sidebar (手動インストール: ~/.tmux/plugins/tmux-agent-sidebar)
# 新規 window で自動的にサイドバー pane を spawn する（常時表示モード）
set -g @sidebar_auto_create on

# 配色を gruber/alacritty パレットに寄せる
set -g @sidebar_color_accent 146           # ラベンダー (#9E95C7 ≈ #AFAFD7)
set -g @sidebar_color_session 146          # session 名も accent と統一
set -g @sidebar_color_waiting 220          # gruber 黄 (#FFDD33 ≈ #FFD700)
set -g @sidebar_color_error 196            # gruber 赤 (#F43841 ≈ #FF0000)
set -g @sidebar_color_text_active 254      # foreground (#E4E4E4 完全一致)

run-shell '~/.tmux/plugins/tmux-agent-sidebar/tmux-agent-sidebar.tmux'
