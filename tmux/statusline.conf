# vim: ft=tmux

# Palette — alacritty/alacritty.toml + themes/gruber_darker.toml に合わせる
#   bg_bar  #1d1530  端末背景 (#2a1f3d) よりわずかに暗い紫
#   fg      #E4E4E4  gruber foreground
#   accent  #9E95C7  gruber magenta (lavender) — セッション名 / アクティブペイン
#   active  #FFDD33  gruber yellow — カレントウィンドウ
#   muted   #7a7189  非アクティブウィンドウ
#   subtle  #52494E  ペイン境界

set -g mode-style "fg=#1d1530,bg=#FFDD33"

set -g message-style "fg=#1d1530,bg=#FFDD33"
set -g message-command-style "fg=#1d1530,bg=#FFDD33"

set -g pane-border-style "fg=#52494E"
set -g pane-active-border-style "fg=#9E95C7"

set -g status "on"
set -g status-interval 5
set -g status-justify "left"

set -g status-style "fg=#E4E4E4,bg=#1d1530"
set -g status-bg "#1d1530"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#1d1530,bg=#9E95C7,bold] #S #[fg=#9E95C7,bg=#1d1530,nobold] "
set -g status-right "#[fg=#7a7189,bg=#1d1530] %Y-%m-%d #[fg=#52494E]│#[fg=#E4E4E4] %H:%M "

setw -g window-status-activity-style "underscore,fg=#FFDD33,bg=#1d1530"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#7a7189,bg=#1d1530"
# @claude_waiting がセットされた非アクティブ window は赤背景反転 + 【 】 で囲う
# カレント window はすでに目視できているので通常の黄色表示のまま（赤囲いは不要）
setw -g window-status-format '#{?@claude_waiting,#[fg=#1d1530#,bg=#F43841#,bold]【 #I  #{b:pane_current_path} 】, #I  #{b:pane_current_path} }'
setw -g window-status-current-format '#[fg=#FFDD33,bg=#1d1530,bold] #I  #{b:pane_current_path} '
